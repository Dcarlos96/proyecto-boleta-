<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Boletas</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="print-area">
    

    <div class="container">
        <div class="remito-info" >
            <span> Fecha: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;/&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;/&nbsp; </span>
            
            <span id="numeroRemito"></span>
        </div>
        <h1>Lavadero </h1>
        <h3 id="clienteMostrado">Cliente: </h3>
        <div class="form-group">
            <input type="text" id="name" placeholder="Ingrese el Nombre del cliente">
            <button onclick="agregarNombre()">Agregar</button>
        </div>
    
        <div class="form-group" style="flex-wrap: wrap;">
            <input type="text" id="producto" placeholder="Nombre del producto">
            <input type="number" id="cantidad" placeholder="Cantidad" min="1">
            <input type="number" id="precio" placeholder="Precio Unitario" min="0" step="0.01">
            <button onclick="agregarProducto()">Agregar</button>
        </div>
        
    
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio Unitario</th>
                    <th>Subtotal</th>
                    <th class="no-print">Eliminar</th>
                </tr>
            </thead>
            <tbody id="tablaProductos"></tbody>
        </table>
    
        <div class="total-row">

            <div class="firmas">
                <div class="firma">Firma: _____________________</div>
                <div class="firma">Firma del Cliente: _____________________</div>
            </div>

            <div class="total">
                Total: $<span id="totalGeneral">0.00</span>
            </div>

        </div>
    
        <button class="btn-print" onclick="window.print()">Imprimir Boleta</button>
    </div>
</div>

<script src="js/main.js"></script>

</body>
</html>
